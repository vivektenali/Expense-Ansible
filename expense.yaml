---
- name: Setting up Infra
  hosts: local
  connection: local
  vars:
    ami_id: ami-0220d79f3f480ecf5
    Instances: ["database", "backend", "frontend", "loadbalancer"]
    domain_name: vivektenali.online
    instance_action: create
  tasks:
    - name: Creating ec2 machine
      amazon.aws.ec2_instance:
        name: expense-{{ item }}
        image_id: "{{ ami_id }}"
        instance_type: t3.micro
        security_groups:
          - expense-common
          - expense-{{ item }}
      loop: "{{ Instances }}"
      register: ec2_output
      when: instance_action == "create"

    - name: Setting up DNS records
      amazon.aws.route53:
        state: present
        zone: "{{ domain_name }}"
        record: "{{ item.item }}.{{ domain_name }}"
        type: A
        ttl: 1
        value: "{{ item.instances[0].private_ip_address }}"
        overwrite: true
      loop: "{{ ec2_output.results }}"
      when: instance_action == "create"
      ignore_errors: true

    - name: Updating DNS Record for Loadbalancer
      amazon.aws.route53:
        state: present
        zone: "{{ domain_name }}"
        record: "{{ domain_name }}"
        type: A
        ttl: 1
        value: "{{ item.instances[0].public_ip_address }}"
      loop: "{{ ec2_output.results }}"
      when:
        - instance_action == "create"
        - item.item == "loadbalancer"
      ignore_errors: true
    - name: Deleting DNS record
      amazon.aws.route53:
        state: absent
        zone: "{{ domain_name }}"
        record: "{{ item }}.{{ domain_name }}"
        type: A
        ttl: 1
        value: "{{ item }}.{{ domain_name }}"
        overwrite: true
      loop: "{{ Instances }}"
      when: instance_action == "delete"
      ignore_errors: true
    - name: Deleting DNS record for Load Balancer
      amazon.aws.route53:
        state: absent
        zone: "{{ domain_name }}"
        record: "{{ domain_name }}"
        type: A
        ttl: 1
        value: "{{ domain_name }}"
        overwrite: true
      loop: "{{ Instances }}"
      when:
        - instance_action == "delete"
        - item == "loadbalancer"
      ignore_errors: true
    - name: Deleting EC2 Instances
      amazon.aws.ec2_instance:
        state: absent
        name: "expense-{{ item }}"
        wait: false
        region: us-east-1
      loop: "{{ Instances }}"
      when: instance_action == "delete"


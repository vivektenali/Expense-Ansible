- name: configuring mysql server
  hosts: database
  become: yes

  tasks:

    - name: install mysql server
      package:
        name: mysql-server
        state: present

    - name: start and enable mysql server
      service:
        name: mysqld
        state: started
        enabled: yes

    - name: setup root password
      command: mysql_secure_installation --set-root-pass ExpenseApp@1